name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Read release notes
        id: notes
        shell: pwsh
        run: |
          $body = Get-Content -Path "RELEASE_NOTES.md" -Raw
          $body = $body -replace '\{VERSION\}', '${{ github.ref_name }}'
          echo "body<<EOF" >> $env:GITHUB_OUTPUT
          echo "$body" >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: "${{ steps.notes.outputs.body }}"
          releaseDraft: false
          prerelease: false
          args: "--bundles msi"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Download Chinese language pack
        continue-on-error: true
        run: |
          $langDir = "C:\Program Files (x86)\Inno Setup 6\Languages"
          if (!(Test-Path $langDir)) { New-Item -ItemType Directory -Path $langDir -Force }
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/ChineseSimplified.isl" -OutFile "$langDir\ChineseSimplified.isl"

      - name: Build Inno Setup installer
        run: iscc installer.iss

      - name: Upload Inno Setup installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          files: installer/Seahi-Serial-Setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
