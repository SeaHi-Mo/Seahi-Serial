// WSL 串口数据读取轮询
function startWslReading(mid) {
    stopReading(mid);
    var reading = false;
    monitors[mid].readTimer = setInterval(async function() {
        if (reading || !monitors[mid] || !monitors[mid].isConnected) { if (!monitors[mid] || !monitors[mid].isConnected) stopReading(mid); return; }
        reading = true;
        try {
            var data = await invoke('read_wsl_serial', { monitorId: mid });
            if (data && data.length > 0) {
                var decoded = decodeData(mid, data);
                decoded = decoded.replace(/[\r\n]+$/, '');
                if (decoded) {
                    var lines = decoded.split(/\r?\n/);
                    for (var i = 0; i < lines.length; i++) {
                        appendOutput(mid, 'recv', lines[i]);
                    }
                }
            }
        } catch (e) {
            var reconnectBtn = document.getElementById(mid + '-btnAutoReconnect');
            if (reconnectBtn && reconnectBtn.classList.contains('on')) {
                try { await invoke('close_wsl_serial', { monitorId: mid }); } catch (_) {}
                monitors[mid].isConnected = false;
                stopReading(mid);
                updateMonitorUI(mid, false);
                var savedPort = monitors[mid].portName;
                appendOutput(mid, 'sys', '连接断开，3秒后自动重连...');
                setTimeout(function() { reconnectWslPort(mid, savedPort); }, 3000);
            } else {
                console.error('[WSL] 读取失败:', e);
            }
        } finally {
            reading = false;
        }
    }, 100);
}

async function reconnectWslPort(mid, portName, attempt) {
    if (!portName) return;
    attempt = attempt || 1;
    if (attempt > 10) { appendOutput(mid, 'err', '重连失败，已达到最大重试次数'); return; }
    var baud = parseInt(document.getElementById(mid + '-baudRate').value) || 115200;
    try {
        appendOutput(mid, 'sys', '正在重连 (' + attempt + '/10): ' + portName);
        await invoke('open_wsl_serial', { monitorId: mid, devicePath: portName, baudRate: baud });
        monitors[mid].isConnected = true;
        monitors[mid].portName = portName;
        updateMonitorUI(mid, true);
        startWslReading(mid);
        appendOutput(mid, 'sys', '重连成功');
    } catch (e) {
        appendOutput(mid, 'err', '重连失败: ' + e);
        var reconnectBtn = document.getElementById(mid + '-btnAutoReconnect');
        if (reconnectBtn && reconnectBtn.classList.contains('on')) {
            var delay = Math.min(3000 * attempt, 30000);
            setTimeout(function() { reconnectWslPort(mid, portName, attempt + 1); }, delay);
        }
    }
}

// WSL 关闭时自动释放所有映射设备
async function autoDetachAllDevices(mid) {
    var detached = [];
    for (var i = 0; i < _wslDevices.length; i++) {
        var d = _wslDevices[i];
        if (d.status === 'mapped' && !_wslBusy[d.busid]) {
            _wslBusy[d.busid] = true;
            try {
                await invoke('detach_port_from_wsl', { busid: d.busid });
                d.status = 'unmapped';
                detached.push(d.name || d.busid);
            } catch (e) { console.error('[WSL] 自动释放失败:', e); }
            delete _wslBusy[d.busid];
        }
    }
    if (detached.length > 0) {
        console.log('[WSL] 已自动释放:', detached);
        renderWslDeviceList(mid);
        // 自动断开后刷新 WSL 串口端口列表
        setTimeout(function() { refreshWslMonPorts(); }, 1000);
    }
}

function setWslMonitorEnabled(enabled) {
    var wmid = 'wsl';
    var panel = document.querySelector('[id$="-wslMonPanel"]');
    console.log('[WSL] setWslMonitorEnabled:', enabled, 'panel:', panel);
    if (!panel) return;
    if (enabled) {
        panel.classList.remove('wsl-mon-disabled');
        refreshWslMonPorts();
    } else {
        panel.classList.add('wsl-mon-disabled');
        if (monitors[wmid] && monitors[wmid].isConnected) {
            disconnectWslPort(wmid);
        }
    }
}

async function refreshWslMonPorts() {
    var wmid = 'wsl';
    var drop = document.getElementById(wmid + '-portDrop');
    if (!drop) return;
    // 记住当前选中的端口
    var ps = document.getElementById(wmid + '-portSelect');
    var prevVal = ps ? ps.getAttribute('data-val') : '';
    // 从 WSL 内部获取串口设备列表
    var ports = [];
    try {
        var devices = await invoke('get_wsl_serial_devices');
        if (devices && devices.length > 0) {
            ports = devices.map(function(d) { return { name: d, label: d }; });
        }
    } catch (e) { console.error('[WSL] 获取串口设备失败:', e); }
    drop.innerHTML = '';
    if (ports.length === 0) {
        drop.innerHTML = '<div class="sel-opt" style="color:var(--text-placeholder);">无可用端口</div>';
        if (ps) {
            ps.setAttribute('data-val', '');
            ps.querySelector('.sel-text').textContent = '无可用端口';
        }
        return;
    }
    // 查找之前选中的端口是否还在列表中
    var matchIdx = ports.findIndex(function(p) { return p.name === prevVal; });
    if (matchIdx < 0) matchIdx = 0;
    ports.forEach(function(p, i) {
        var div = document.createElement('div');
        div.className = 'sel-opt' + (i === matchIdx ? ' active' : '');
        div.setAttribute('data-val', p.name);
        div.textContent = p.label;
        div.addEventListener('click', function(e) { e.stopPropagation(); setSel(div, p.name, e); });
        drop.appendChild(div);
    });
    if (ps && ports.length > 0) {
        ps.setAttribute('data-val', ports[matchIdx].name);
        ps.querySelector('.sel-text').textContent = ports[matchIdx].label;
    }
}

function initWslMonResize(mid) {
    var handle = document.getElementById(mid + '-wslMonResize');
    var topPanel = document.getElementById(mid + '-wslTop');
    var monPanel = document.getElementById(mid + '-wslMonPanel');
    if (!handle || !topPanel || !monPanel) return;
    var startY = 0, startTopH = 0, startMonH = 0;
    function onMouseDown(e) {
        e.preventDefault();
        startY = e.clientY;
        startTopH = topPanel.offsetHeight;
        startMonH = monPanel.offsetHeight;
        handle.classList.add('dragging');
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
    }
    function onMouseMove(e) {
        var dy = e.clientY - startY;
        var parentH = monPanel.parentElement.offsetHeight || window.innerHeight;
        var handleH = handle.offsetHeight || 5;
        // 减去 WSL 标题栏（发行版卡片行）的占用高度
        var headerBar = topPanel.previousElementSibling;
        var headerBarH = headerBar ? headerBar.offsetHeight : 0;
        var minTopH = 100; // 表头 ~30px + 1行设备 ~40px + 余量
        var availableH = parentH - headerBarH - handleH - 10;
        var maxMonH = Math.max(120, availableH - minTopH);
        var newTopH = Math.max(minTopH, startTopH + dy);
        var newMonH = Math.max(120, Math.min(maxMonH, startMonH - dy));
        // 拖拽期间用固定高度，松手后会切换为 flex-basis
        topPanel.style.flex = 'none';
        topPanel.style.height = newTopH + 'px';
        monPanel.style.flex = 'none';
        monPanel.style.height = newMonH + 'px';
    }
    function onMouseUp() {
        handle.classList.remove('dragging');
        // 松手后：去掉固定 height，改用 flex-basis，让 flex 容器在窗口缩小时自动缩小面板
        var finalH = monPanel.offsetHeight;
        monPanel.style.height = '';
        monPanel.style.flex = '0 1 ' + finalH + 'px';
        monPanel.style.minHeight = '120px';
        topPanel.style.flex = '1';
        topPanel.style.height = '';
        // 保存面板高度到状态
        if (monitors['wsl'] && monitors['wsl']._savedSettings) {
            monitors['wsl']._savedSettings.panelHeight = finalH;
        } else if (monitors['wsl']) {
            monitors['wsl']._savedSettings = { panelHeight: finalH };
        }
        scheduleConfigSave();
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
    }
    handle.addEventListener('mousedown', onMouseDown);
}

function renderWslDistroCards(mid, distros) {
    var container = document.getElementById(mid + '-wslDistroList');
    if (!container) return;
    if (!distros || distros.length === 0) {
        container.innerHTML = '<div style="color:var(--text-muted);font-size:12px;">未检测到 WSL 分发版</div>';
        stopWslUptimeTicker();
        return;
    }
    var html = '';
    distros.forEach(function(d) {
        var running = d.running;
        var borderColor = running ? 'var(--wsl-dist-border)' : 'var(--border)';
        var bgGrad = running ? 'linear-gradient(135deg,var(--wsl-dist-bg) 0%,var(--toolbar-bg) 100%)' : 'var(--toolbar-bg)';
        var dotColor = running ? 'var(--accent-green)' : 'var(--text-d)';
        var uptime = running && d.uptime ? d.uptime : '00:00:00';
        var mem = running && d.memTotalMB > 0 ? d.memUsedMB + ' / ' + d.memTotalMB + ' MB' : '—';
        var btnText = running ? '关闭' : '启动';
        var btnBg = running ? 'var(--btn-p)' : 'var(--surface-1)';
        var btnBorder = running ? 'var(--btn-p)' : 'var(--border)';
        var btnColor = running ? '#fff' : 'var(--text)';
        var btnAction = running
            ? "wslDistAction('shutdown_wsl','" + d.name.replace(/'/g, "\\'") + "')"
            : "wslDistAction('launch_wsl','" + d.name.replace(/'/g, "\\'") + "')";

        if (running) {
            var parts = d.uptime.split(':').map(Number);
            var secs = (parts[0] || 0) * 3600 + (parts[1] || 0) * 60 + (parts[2] || 0);
            _wslDistroBasetime[d.name] = { baseSeconds: secs, anchorMs: Date.now() };
        } else {
            delete _wslDistroBasetime[d.name];
        }

        html += '<div style="padding:8px 14px;background:' + bgGrad + ';border:1px solid ' + borderColor + ';border-radius:6px;display:flex;align-items:center;gap:12px;">';
        html += '<span style="width:8px;height:8px;border-radius:50%;background:' + dotColor + ';flex-shrink:0;' + (running ? 'box-shadow:0 0 6px rgba(90,158,110,0.4);' : '') + '"></span>';
        html += '<span style="font-size:13px;font-weight:600;color:var(--text-b);white-space:nowrap;" title="' + d.name + '">' + d.name + '</span>';
        html += '<span style="width:1px;height:14px;background:var(--border);flex-shrink:0;margin:0 2px;"></span>';
        html += '<span style="font-size:10px;color:var(--text-muted);font-weight:500;">UP</span>';
        html += '<span id="uptime-' + mid + '-' + d.name + '" style="font-size:11px;color:var(--text);font-family:monospace;letter-spacing:0.3px;">' + uptime + '</span>';
        html += '<span style="width:1px;height:14px;background:var(--border);flex-shrink:0;margin:0 2px;"></span>';
        html += '<span style="font-size:10px;color:var(--text-muted);font-weight:500;">MEM</span>';
        html += '<span style="font-size:11px;color:var(--text);font-family:monospace;">' + mem + '</span>';
        html += '<button onclick="' + btnAction + '" onmousedown="this.style.transform=\'scale(0.90)\';this.style.filter=\'brightness(0.7)\';this.style.opacity=\'0.6\'" onmouseup="this.style.transform=\'\';this.style.filter=\'\';this.style.opacity=\'\'" onmouseleave="this.style.transform=\'\';this.style.filter=\'\';this.style.opacity=\'\'" style="flex-shrink:0;height:24px;padding:0 12px;border:1px solid ' + btnBorder + ';border-radius:4px;background:' + btnBg + ';color:' + btnColor + ';font-size:11px;cursor:pointer;font-weight:500;transition:all .1s ease;">' + btnText + '</button>';
        html += '</div>';
    });
    container.innerHTML = html;
    startWslUptimeTicker(mid);
}

function wslFormatUptime(totalSeconds) {
    var h = Math.floor(totalSeconds / 3600);
    var m = Math.floor((totalSeconds % 3600) / 60);
    var s = Math.floor(totalSeconds % 60);
    return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
}

function startWslUptimeTicker(mid) {
    if (_wslUptimeTimer) { clearInterval(_wslUptimeTimer); _wslUptimeTimer = null; }
    if (Object.keys(_wslDistroBasetime).length === 0) return;
    _wslUptimeTimer = setInterval(function() {
        var now = Date.now();
        Object.keys(_wslDistroBasetime).forEach(function(name) {
            var bt = _wslDistroBasetime[name];
            if (!bt) return;
            var elapsed = Math.floor((now - bt.anchorMs) / 1000);
            var total = bt.baseSeconds + elapsed;
            var el = document.getElementById('uptime-' + mid + '-' + name);
            if (el) el.textContent = wslFormatUptime(total);
        });
    }, 1000);
}

function stopWslUptimeTicker() {
    if (_wslUptimeTimer) { clearInterval(_wslUptimeTimer); _wslUptimeTimer = null; }
    _wslDistroBasetime = {};
}

// 绑定监视器事件监听器
function bindMonitorEvents(mid) {
    // 绑定键盘：Enter 发送，上/下箭头浏览历史
    var sendInput = document.getElementById(mid + '-sendInput');
    if (sendInput) {
        sendInput.addEventListener('keydown', function(e) {
            var hist = monitors[mid].sendHistory;
            var histEl = document.getElementById(mid + '-sendHist');
            if (e.key === 'Enter') {
                e.preventDefault();
                if (histEl && histEl.classList.contains('open')) {
                    var selItem = histEl.querySelector('.send-hist-item.selected');
                    if (selItem) {
                        sendInput.value = selItem.textContent;
                        histEl.classList.remove('open');
                        sendInput.focus();
                        return;
                    }
                }
                sendData(mid);
                if (histEl) histEl.classList.remove('open');
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (histEl && histEl.classList.contains('open')) {
                    var selItem = histEl.querySelector('.send-hist-item.selected');
                    if (selItem && selItem.nextElementSibling) {
                        selItem.classList.remove('selected');
                        selItem.nextElementSibling.classList.add('selected');
                        selItem.nextElementSibling.scrollIntoView({ block: 'nearest' });
                    }
                } else if (hist.length > 0) {
                    showSendHistory(mid);
                    var items = histEl ? histEl.querySelectorAll('.send-hist-item') : [];
                    if (items.length > 0) items[0].classList.add('selected');
                }
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (histEl && histEl.classList.contains('open')) {
                    var selItem = histEl.querySelector('.send-hist-item.selected');
                    if (selItem && selItem.previousElementSibling) {
                        selItem.classList.remove('selected');
                        selItem.previousElementSibling.classList.add('selected');
                        selItem.previousElementSibling.scrollIntoView({ block: 'nearest' });
                    } else if (!selItem || !selItem.previousElementSibling) {
                        histEl.classList.remove('open');
                    }
                } else if (hist.length > 0) {
                    monitors[mid].histNavIdx = Math.min(monitors[mid].histNavIdx + 1, hist.length - 1);
                    sendInput.value = hist[monitors[mid].histNavIdx];
                }
            } else if (e.key === 'Escape') {
                if (histEl) histEl.classList.remove('open');
                monitors[mid].histNavIdx = -1;
            }
        });
        // 输入时重置历史导航索引
        sendInput.addEventListener('input', function() { monitors[mid].histNavIdx = -1; });
    }
}

// 快照 WSL 监视器的当前设置到状态中（DOM 即将被替换时调用）
function snapshotWslSettings() {
    var wmid = 'wsl';
    if (!monitors[wmid]) return;
    var portSel   = document.getElementById(wmid + '-portSelect');
    var baudInp   = document.getElementById(wmid + '-baudRate');
    var lineEnd   = document.getElementById(wmid + '-lineEnding');
    var viewMode  = document.getElementById(wmid + '-viewMode');
    var chkDTR    = document.getElementById(wmid + '-chkDTR');
    var chkRTS    = document.getElementById(wmid + '-chkRTS');
    var monPanel  = document.querySelector('[id$="-wslMonPanel"]');
    monitors[wmid]._savedSettings = {
        port:         portSel  ? (portSel.getAttribute('data-val') || '') : '',
        baud:         baudInp  ? baudInp.value : '115200',
        lineEnding:   lineEnd  ? (lineEnd.getAttribute('data-val') || 'crlf') : 'crlf',
        viewMode:     viewMode ? (viewMode.getAttribute('data-val') || 'text') : 'text',
        dtr:          chkDTR   ? chkDTR.checked : false,
        rts:          chkRTS   ? chkRTS.checked : true,
        panelHeight:  monPanel ? monPanel.offsetHeight : 0,
    };
    // 保存 WSL 输出内容
    var wslOutput = document.getElementById(wmid + '-output');
    if (wslOutput) monitors[wmid]._savedOutputHtml = wslOutput.innerHTML;
    scheduleConfigSave();
}

function restoreMonitorPane() {
    console.log('[WSL] 返回监视器页面');
    if (_wslStatusUnlisten) { _wslStatusUnlisten(); _wslStatusUnlisten = null; }
    var wmid = 'wsl';
    if (monitors[wmid] && monitors[wmid].readTimer) {
        stopReading(wmid);
    }
    // 切换面板显示
    document.getElementById('wsl-pane').style.display = 'none';
    document.getElementById('paneContainer').style.display = 'flex';
    // 恢复顶部栏按钮
    var btn = document.getElementById('wslToggleBtn');
    var text = document.getElementById('wslToggleText');
    var icon = document.getElementById('wslToggleIcon');
    if (btn && text) {
        text.textContent = 'WSL 端口映射';
        btn.setAttribute('onclick', 'openWslMapping()');
        if (icon) icon.innerHTML = '<rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/><line x1="12" y1="17" x2="12" y2="21"/>';
    }
}

// WSL 发行版启动/关闭，操作后延迟刷新 UI
function wslDistAction(cmd, dist) {
    // 找到被点击的按钮，显示加载动画
    var btn = window.event && window.event.target;
    if (btn && btn.tagName === 'BUTTON') {
        btn.disabled = true;
        btn._origText = btn.textContent;
        btn.innerHTML = '<span style="display:inline-block;width:10px;height:10px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:wsl-spin .6s linear infinite;vertical-align:middle;"></span>';
    }
    invoke(cmd, {dist: dist}).then(function() {
        // 操作完成后延迟刷新，等待 WSL 状态稳定
        setTimeout(function() {
            document.querySelectorAll('[id$="-wslDistroList"]').forEach(function(el) {
                var mid = el.id.replace('-wslDistroList', '');
                var fn = el.closest('.monitor-pane');
                if (fn) {
                    invoke('get_wsl_distributions').then(function(distros) {
                        renderWslDistroCards(mid, distros);
                    });
                    invoke('check_wsl_status').then(function(dists) {
                        _wslRunning = dists && dists.length > 0;
                        setWslMonitorEnabled(_wslRunning);
                        renderWslDeviceList(mid);
                    });
                }
            });
        }, 1500);
    }).catch(function(e) {
        console.error('[WSL] 操作失败:', cmd, dist, e);
        if (btn) {
            btn.disabled = false;
            btn.textContent = btn._origText || dist;
        }
    });
}

// WSL设备数据
var _wslDevices = [];
var _wslBusy = {}; // { busid: true } 正在操作中的设备
var _wslAutoMap = {}; // { busid: portName } 开启自动映射的设备
var _wslAutoMapTimer = null;
var _wslSavedConfig = null; // 缓存从配置文件加载的 WSL 监视器配置，防止主监视器保存时丢失
var _wslStatusUnlisten = null; // WSL 状态事件监听取消函数
var _wslRunning = false; // WSL 是否正在运行
var _wslUptimeTimer = null; // 运行时间秒级更新定时器
var _wslDistroBasetime = {}; // { distroName: { baseSeconds, anchorMs } } 运行时间基准

function sortWslDevices() {
    _wslDevices.sort(function(a, b) {
        return (a.busid || '').localeCompare(b.busid || '', undefined, { numeric: true, sensitivity: 'base' });
    });
}

async function loadWslDevices(mid) {
    console.log('[WSL] 加载设备列表');
    var container = document.getElementById(mid + '-wslDeviceList');
    if (!container) {
        console.error('[WSL] 未找到设备列表容器');
        return;
    }
    
    try {
        var devices = await invoke('list_wsl_devices');
        
        // 保留正在操作中的设备（防止取消映射后设备消失）
        var newBusids = {};
        devices.forEach(function(d) { newBusids[d.busid] = true; });
        _wslDevices.forEach(function(d) {
            if (_wslBusy[d.busid] && !newBusids[d.busid]) {
                devices.push(d);
            }
        });
        
        _wslDevices = devices;
        sortWslDevices();
        
        console.log('[WSL] 设备列表:', _wslDevices);
        renderWslDeviceList(mid);
    } catch (e) {
        console.error('[WSL] 加载设备列表失败:', e);
        container.innerHTML = '<div style="color:var(--accent-red);text-align:center;padding:20px;">加载失败: ' + e + '</div>';
    }
}

function renderWslDeviceList(mid) {
    var container = document.getElementById(mid + '-wslDeviceList');
    if (!container) return;
    
    if (_wslDevices.length === 0) {
        container.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-soft);">' +
            '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--text-d)" stroke-width="1.5" style="margin-bottom:10px;"><rect x="2" y="3" width="20" height="14" rx="2"/><polyline points="8 21 12 17 16 21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>' +
            '<div style="font-size:13px;">未发现可用的 USB 设备</div>' +
            '<div style="font-size:11px;margin-top:4px;color:var(--text-muted);">连接设备后将自动刷新</div>' +
        '</div>';
        return;
    }
    
    var html = '<div style="padding:10px 14px;display:flex;flex-direction:column;gap:6px;">';

    // 表头
    html += '<div style="display:flex;align-items:center;padding:6px 14px;gap:14px;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;font-weight:600;">';
    html += '<span style="width:70px;flex-shrink:0;">BUSID</span>';
    html += '<span style="width:80px;flex-shrink:0;">端口</span>';
    html += '<span style="flex:1;min-width:0;">设备名称</span>';
    html += '<span style="width:60px;flex-shrink:0;text-align:center;">自动</span>';
    html += '<span style="width:50px;flex-shrink:0;text-align:center;">映射</span>';
    html += '</div>';
    // 分隔线
    html += '<div style="height:1px;background:var(--border);margin:0 4px;"></div>';
    
    _wslDevices.forEach(function(device, idx) {
        var isMapped = device.status === 'mapped';
        var isBusy = _wslBusy[device.busid];
        var rowBg = isMapped ? 'var(--mapped-bg)' : 'transparent';
        var rowBorder = isMapped ? 'var(--mapped-border)' : 'var(--border)';
        var safeName = (device.name || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        var safeBusid = device.busid || '';
        var safePort = device.port || '';
        
        html += '<div class="wsl-device-row" style="display:flex;align-items:center;padding:10px 14px;gap:14px;border-radius:4px;background:' + rowBg + ';border:1px solid ' + rowBorder + ';cursor:default;' + (isBusy ? 'opacity:0.6;' : '') + '">';
        // BUSID
        html += '<span style="width:70px;flex-shrink:0;font-family:monospace;font-size:12px;color:var(--text-d);font-weight:500;">' + safeBusid + '</span>';
        // 端口
        if (isBusy) {
            var direction = isMapped ? '← WSL' : '→ WSL';
            html += '<span style="width:80px;flex-shrink:0;font-family:monospace;font-size:12px;"><span class="wsl-loading-cell"><span class="wsl-spinner"></span>' + direction + '</span></span>';
        } else {
            var portColor = isMapped ? 'var(--accent-green)' : 'var(--link)';
            var portText = isMapped ? 'WSL' : safePort;
            html += '<span style="width:80px;flex-shrink:0;font-family:monospace;font-size:12px;font-weight:600;color:' + portColor + ';">' + portText + '</span>';
        }
        // 设备名称
        html += '<span style="flex:1;min-width:0;font-size:12px;color:var(--text-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4;" title="' + safeName + '">' + safeName + '</span>';
        // 自动映射
        var autoOn = !!_wslAutoMap[safeBusid];
        var autoDisabled = isMapped || !_wslRunning;
        html += '<span style="width:60px;flex-shrink:0;text-align:center;">';
        html += '<label class="wsl-auto-toggle"><input type="checkbox" ' + (autoOn ? 'checked' : '') + ' ' + (autoDisabled ? 'disabled' : '') + ' onchange="toggleAutoMap(\'' + safeBusid.replace(/'/g,"\\'") + '\', \'' + safePort.replace(/'/g,"\\'") + '\', this.checked)"><span class="wsl-auto-slider"></span></label>';
        html += '</span>';
        // 映射
        var mapDisabled = isBusy || !_wslRunning;
        html += '<span style="width:50px;flex-shrink:0;text-align:center;">';
        html += '<input type="checkbox" class="wsl-checkbox" ' + (isMapped ? 'checked' : '') + ' ' + (mapDisabled ? 'disabled' : '') + ' onchange="toggleWslMapping(\'' + mid + '\', ' + idx + ', this.checked)">';
        html += '</span>';
        html += '</div>';
    });
    
    html += '</div>';
    container.innerHTML = html;
}
async function toggleWslMapping(mid, idx, checked) {
    if (!_wslRunning) return;
    var device = _wslDevices[idx];
    if (!device || _wslBusy[device.busid]) return;
    
    _wslBusy[device.busid] = true;
    renderWslDeviceList(mid);
    
    var attachId = device.hasCom ? device.port : device.busid;
    
    if (checked) {
        try {
            await invoke('attach_port_to_wsl', { portName: attachId });
            device.status = 'mapped';
        } catch (e) { console.error('[WSL] 映射失败:', e); }
    } else {
        try {
            // 如果 WSL 监视器正在使用该设备的 WSL 端口，先关闭连接释放资源
            var wmid = 'wsl';
            if (monitors[wmid] && monitors[wmid].isConnected) {
                var wslPath = device.wslPath || '';
                var portName = monitors[wmid].portName || '';
                if (wslPath && portName && (portName === wslPath || portName.indexOf(wslPath) !== -1 || wslPath.indexOf(portName) !== -1)) {
                    appendOutput(wmid, 'sys', '取消映射：正在关闭 WSL 串口连接...');
                    await disconnectWslPort(wmid);
                }
            }
            await invoke('detach_port_from_wsl', { busid: device.busid });
            device.status = 'unmapped';
        } catch (e) { console.error('[WSL] 断开失败:', e); }
    }
    
    delete _wslBusy[device.busid];
    renderWslDeviceList(mid);
    // 映射/断开后自动刷新 WSL 串口端口列表
    setTimeout(function() { refreshWslMonPorts(); }, 1000);
    // 后台静默刷新：合并数据，保留当前列表中的设备
    try {
        var fresh = await invoke('list_wsl_devices');
        var freshMap = {};
        fresh.forEach(function(d) { freshMap[d.busid] = d; });
        // 保留现有设备，用 fresh 数据更新状态
        _wslDevices.forEach(function(d) {
            if (freshMap[d.busid]) {
                d.status = freshMap[d.busid].status;
                d.port = freshMap[d.busid].port;
                d.name = freshMap[d.busid].name;
                if (freshMap[d.busid].wslPath) d.wslPath = freshMap[d.busid].wslPath;
            }
        });
        // 添加 fresh 中新出现的设备
        var existBusids = {};
        _wslDevices.forEach(function(d) { existBusids[d.busid] = true; });
        fresh.forEach(function(d) {
            if (!existBusids[d.busid]) _wslDevices.push(d);
        });
        sortWslDevices();
        renderWslDeviceList(mid);
    } catch (e) {}
}

/* ===== 自动映射 ===== */
function toggleAutoMap(busid, portName, on) {
    if (!_wslRunning) return;
    if (on) {
        _wslAutoMap[busid] = portName;
    } else {
        delete _wslAutoMap[busid];
        // 清除该设备的忙碌状态
        delete _wslBusy[busid];
    }
    scheduleConfigSave();
    updateAutoMapPolling();
    // 刷新当前显示的设备列表
    var pane = document.querySelector('.monitor-pane');
    if (pane) {
        var mid = pane.id.replace('pane-', '');
        renderWslDeviceList(mid);
    }
}

function updateAutoMapPolling() {
    var hasAny = Object.keys(_wslAutoMap).length > 0;
    if (hasAny && !_wslAutoMapTimer) {
        _wslAutoMapTimer = setInterval(autoMapCheck, 5000);
    } else if (!hasAny && _wslAutoMapTimer) {
        clearInterval(_wslAutoMapTimer);
        _wslAutoMapTimer = null;
    }
}

async function autoMapCheck() {
    if (Object.keys(_wslAutoMap).length === 0) return;
    try {
        var devices = await invoke('list_wsl_devices');
        // 收集需要映射的设备，并发执行
        var tasks = [];
        for (var i = 0; i < devices.length; i++) {
            var d = devices[i];
            if (_wslAutoMap[d.busid] && d.status !== 'mapped' && !_wslBusy[d.busid]) {
                _wslBusy[d.busid] = true;
                var autoAttachId = d.hasCom ? d.port : d.busid;
                (function(device, attachId) {
                    tasks.push(
                        invoke('attach_port_to_wsl', { portName: attachId })
                            .then(function(result) { 
                                device.status = 'mapped';
                            })
                            .catch(function(e) { 
                                console.error('[WSL] 自动映射失败:', e);
                            })
                            .finally(function() { 
                                delete _wslBusy[device.busid]; 
                            })
                    );
                })(d, autoAttachId);
            }
        }
        if (tasks.length > 0) {
            await Promise.all(tasks);
        }
        // 如果 WSL 页面打开，刷新列表
        var pane = document.querySelector('.monitor-pane');
        if (pane) {
            var mid = pane.id.replace('pane-', '');
            var listEl = document.getElementById(mid + '-wslDeviceList');
            if (listEl) {
                // 合并状态，保留 _wslBusy 状态
                var freshMap = {};
                devices.forEach(function(d) { freshMap[d.busid] = d; });
                _wslDevices.forEach(function(d) {
                    if (freshMap[d.busid]) {
                        d.status = freshMap[d.busid].status;
                        d.port = freshMap[d.busid].port;
                        d.name = freshMap[d.busid].name;
                    }
                });
                var existBusids = {};
                _wslDevices.forEach(function(d) { existBusids[d.busid] = true; });
                devices.forEach(function(d) {
                    if (!existBusids[d.busid]) _wslDevices.push(d);
                });
                sortWslDevices();
                renderWslDeviceList(mid);
            }
        }
        // 自动映射完成后也刷新 WSL 串口端口列表
        if (tasks.length > 0) {
            setTimeout(function() { refreshWslMonPorts(); }, 1500);
        }
    } catch (e) {
        // 静默失败，下次轮询重试
    }
}

function refreshWslDevices() {
    var pane = document.querySelector('.monitor-pane');
    if (pane) {
        var mid = pane.id.replace('pane-', '');
        loadWslDevices(mid);
    }
}

/* ===== 初始化 ===== */
document.addEventListener('DOMContentLoaded', function() {
    createMonitorPane('main', '主监视器', false);
    setInterval(function() { if (!monitors.main || !monitors.main.isConnected) refreshPorts('main'); }, 10000);

    // 加载并恢复用户上次的配置
    loadAndApplyConfig();

    // 延迟检查更新，避免与端口加载竞争网络和 CPU 资源
    setTimeout(checkForUpdate, 2000);

    // 监听设备变更事件，自动刷新端口列表（防抖 150ms）
    if (window.__TAURI__ && window.__TAURI__.event) {
        var _deviceChangeTimer = null;
        window.__TAURI__.event.listen('device-changed', function() {
            console.log('[device-changed] event received at', Date.now());
            if (_deviceChangeTimer) clearTimeout(_deviceChangeTimer);
            _deviceChangeTimer = setTimeout(function() {
                _deviceChangeTimer = null;
                console.log('[device-changed] refreshing ports at', Date.now());
                document.querySelectorAll('.monitor-pane').forEach(function(pane) {
                    var mid = pane.id.replace('pane-', '');
                    if (!monitors[mid] || !monitors[mid].isConnected) refreshPorts(mid, true);
                });
                // WSL 页面打开时也刷新设备列表
                var wslList = document.querySelector('[id$="-wslDeviceList"]');
                if (wslList) {
                    var wslMid = wslList.id.replace('-wslDeviceList', '');
                    loadWslDevices(wslMid);
                }
            }, 150);
        });
    }

    // 监听窗口大小变化，缓存并保存到配置（防抖 500ms）
    function refreshWindowSizeCache() {
        invoke('get_window_size').then(function(size) {
            _cachedWindowSize = size;
        }).catch(function() {});
    }
    refreshWindowSizeCache();
    var _resizeTimer = null;
    window.addEventListener('resize', function() {
        refreshWindowSizeCache();
        if (_resizeTimer) clearTimeout(_resizeTimer);
        _resizeTimer = setTimeout(function() {
            _resizeTimer = null;
            scheduleConfigSave();
        }, 500);
    });

    // 首次使用引导
    if (!localStorage.getItem('onboarding_done')) {
        setTimeout(showOnboarding, 600);
    }
});

    {
        target: '.global-bar',

var _onboardIdx = 0;

function showOnboarding() {
    _onboardIdx = 0;
    _onboardPrevTarget = null;
    var overlay = document.getElementById('onboarding-overlay');
    var nav = document.getElementById('onboard-nav');
    var dotsEl = document.getElementById('onboard-dots');
    dotsEl.innerHTML = '';
    _onboardSteps.forEach(function(_, i) {
        var d = document.createElement('span');
        d.className = 'onboard-dot' + (i === 0 ? ' active' : '');
        dotsEl.appendChild(d);
    });
    overlay.classList.add('show');
    nav.style.display = 'flex';
    overlay.onclick = function(e) {
        if (e.target === overlay) closeOnboarding();
    };
    goStep(0);
}

var _onboardPrevTarget = null;

function goStep(idx) {
    _onboardIdx = idx;
    var step = _onboardSteps[idx];
    // 清除上一个目标的高亮
    if (_onboardPrevTarget) {
        _onboardPrevTarget.style.boxShadow = '';
        _onboardPrevTarget.style.position = '';
        _onboardPrevTarget.style.zIndex = '';
        _onboardPrevTarget.style.borderRadius = '';
    }
    var el = document.querySelector(step.target);
    if (!el) { nextStep(); return; }
    _onboardPrevTarget = el;
    var rect = el.getBoundingClientRect();
    var card = document.getElementById('onboard-step');
    var title = document.getElementById('onboard-title');
    var desc = document.getElementById('onboard-desc');
    var arrow = document.getElementById('onboard-arrow');
    var nextBtn = document.getElementById('onboard-next');
    title.textContent = step.title;
    desc.textContent = step.desc;
    nextBtn.textContent = idx === _onboardSteps.length - 1 ? '开始使用' : '下一步';
    // 聚光灯：给目标元素加 box-shadow（更深更亮）
    el.style.boxShadow = '0 0 0 4px var(--accent-focus, #4a7ab5), 0 0 24px 4px rgba(74,122,181,0.5), 0 0 0 9999px rgba(0,0,0,0.65)';
    el.style.position = 'relative';
    el.style.zIndex = '10001';
    el.style.borderRadius = '4px';
    // 先渲染内容，再测量卡片实际尺寸
    card.classList.remove('anim-in');
    card.style.top = '-9999px';
    card.style.left = '-9999px';
    card.style.visibility = 'hidden';
    card.style.display = '';
    arrow.className = 'onboard-arrow';
    arrow.style.left = '0px';
    var gap = 14;
    if (step.pos === 'bottom') {
        arrow.classList.add('top');
    } else {
        arrow.classList.add('bottom');
    }
    // 测量卡片实际尺寸
    var cardW = card.offsetWidth;
    var cardH = card.offsetHeight;
    // 目标元素水平中心点（或右侧对齐点）
    var targetCX = step.arrowAlign === 'right'
        ? rect.left + rect.width - 15
        : rect.left + rect.width / 2;
    // 理想卡片位置：水平居中对齐目标中心
    var idealLeft = targetCX - cardW / 2;
    var idealTop;
    if (step.pos === 'bottom') {
        idealTop = rect.bottom + gap;
    } else {
        idealTop = rect.top - gap - cardH;
    }
    // 边界 clamp（底部预留导航栏空间 ~80px）
    var vpW = window.innerWidth;
    var vpH = window.innerHeight;
    var navReserved = 80;
    var clampedLeft = Math.max(12, Math.min(idealLeft, vpW - cardW - 12));
    var clampedTop = Math.max(12, Math.min(idealTop, vpH - cardH - navReserved));
    // 箭头在卡片内的 X 偏移 = 目标中心点 - 卡片左边界，限制在卡片范围内
    var arrowX = targetCX - clampedLeft;
    arrowX = Math.max(16, Math.min(arrowX, cardW - 16));
    arrow.style.left = arrowX + 'px';
    // 应用位置
    card.style.visibility = '';
    card.style.top = clampedTop + 'px';
    card.style.left = clampedLeft + 'px';
    void card.offsetWidth;
    card.classList.add('anim-in');
    // 更新步骤指示点
    var dots = document.querySelectorAll('.onboard-dot');
    dots.forEach(function(d, i) { d.classList.toggle('active', i === idx); });
}

function nextStep() {
    if (_onboardIdx < _onboardSteps.length - 1) {
        goStep(_onboardIdx + 1);
    } else {
        closeOnboarding();
    }
}

function closeOnboarding() {
    var overlay = document.getElementById('onboarding-overlay');
    var nav = document.getElementById('onboard-nav');
    if (!overlay.classList.contains('show')) return;
    overlay.classList.remove('show');
    overlay.onclick = null;
    nav.style.display = 'none';
    nav.onclick = null;
    localStorage.setItem('onboarding_done', '1');
    // 清除当前目标的高亮
    if (_onboardPrevTarget) {
        _onboardPrevTarget.style.boxShadow = '';
        _onboardPrevTarget.style.position = '';
        _onboardPrevTarget.style.zIndex = '';
        _onboardPrevTarget.style.borderRadius = '';
        _onboardPrevTarget = null;
    }
}
